<div class="accordion mb-2" id="spoiler-{{ include.problem }}">
    <div class="accordion-item">
        <h2 class="accordion-header">
            <button class="accordion-button" type="button" data-bs-toggle="collapse"
                data-bs-target="#answer-{{ include.problem }}" aria-expanded="true"
                aria-controls="collapseOne">
                Spoiler! {{ include.title }}
            </button>
        </h2>
        <div id="answer-{{ include.problem }}" class="accordion-collapse collapse"
            aria-labelledby="headingOne" data-bs-parent="#spoiler-{{ include.problem }}">
            <div class="accordion-body">
                <p>{{ include.answer }}</p>
            </div>
        </div>
    </div>
</div>
