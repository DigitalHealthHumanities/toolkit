<div class="mx-auto card">
    <div class="card-body dhht-definition">
        <h4>Key Terms</h4>
        {% for item in site.data.terms[include.permalink] %}
            <hr />
            <p class="term" id="{{ item.term | slugify }}">{{ item.term }}</p>
            <p>{{ item.definition }}</p>
        {% endfor %}
    </div>
</div>
