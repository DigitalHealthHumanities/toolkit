  - term: "Deliverable"
    definition: "Deliverables are concrete research or methodological outputs which are prepared to be shared with others, based on yours and your receiver’s expectations. These can be very polished—like a published book manuscript—or something that is a work in progress—like a draft you submit to a writing group. Deliverables are most important because they give us clear goals to work toward, and they help benchmark progress"

